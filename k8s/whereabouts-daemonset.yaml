apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: whereabouts
  namespace: kube-system
  labels:
    app: whereabouts
spec:
  selector:
    matchLabels:
      app: whereabouts
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: whereabouts
    spec:
      hostNetwork: true
      serviceAccountName: whereabouts
      initContainers:
      - name: install-cni
        image: ghcr.io/k8snetworkplumbingwg/whereabouts:v0.9.4
        command: ["/install-cni.sh"]
        env:
        - name: WHEREABOUTS_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODENAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - {name: cnibin,      mountPath: /host/opt/cni/bin}
        - {name: cni-net-dir, mountPath: /host/etc/cni/net.d}
      containers:
      - name: whereabouts
        image: ghcr.io/k8snetworkplumbingwg/whereabouts:v0.9.4
        env:
        - name: WHEREABOUTS_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODENAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        resources:
          requests: {cpu: 100m, memory: 100Mi}
          limits:   {cpu: 100m, memory: 200Mi}
        volumeMounts:
        - {name: cnibin,      mountPath: /host/opt/cni/bin}
        - {name: cni-net-dir, mountPath: /host/etc/cni/net.d}
      volumes:
      - {name: cnibin,      hostPath: {path: /opt/cni/bin}}
      - {name: cni-net-dir, hostPath: {path: /etc/cni/net.d}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: whereabouts
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: whereabouts
rules:
- apiGroups: ["whereabouts.cni.cncf.io"]
  resources: ["ippools","overlappingrangeipreservations"]
  verbs: ["get","list","watch","create","update","patch","delete"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get","list","watch","create","update","patch","delete"]
- apiGroups: [""]
  resources: ["pods","nodes","namespaces","configmaps","events"]
  verbs: ["get","list","watch","create","patch","update"]
- apiGroups: ["k8s.cni.cncf.io"]
  resources: ["network-attachment-definitions"]
  verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: whereabouts
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: whereabouts
subjects:
- kind: ServiceAccount
  name: whereabouts
  namespace: kube-system
